
name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find project zip
        id: find_zip
        run: |
          ZIP_FILE=$(find . -name "*.zip" | head -n 1)
          echo "zip_path=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Unzip project
        run: |
          unzip "${{ steps.find_zip.outputs.zip_path }}" -d project

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli

      - name: Initialize Capacitor
        run: |
          cd project
          npx cap init vtuber.app vtuber.app

      - name: Add Android
        run: |
          cd project
          npx cap add android

      - name: Build APK
        run: |
          cd project/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: project/android/app/build/outputs/apk/debug/*.apk
