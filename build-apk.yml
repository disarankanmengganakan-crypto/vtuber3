name: Build Android APK from uploaded zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find project zip
        id: find_zip
        shell: bash
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found in repository root. Upload vtuber_oshi_app_github_actions.zip first."
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "Using $ZIP_FILE"

      - name: Unzip project
        run: |
          unzip -q "${{ steps.find_zip.outputs.zip_file }}" -d extracted
          find extracted -maxdepth 3 -type f | head -50

      - name: Locate Gradle project
        id: project
        shell: bash
        run: |
          PROJECT_DIR=$(find extracted -name settings.gradle -o -name settings.gradle.kts | head -n 1 | xargs dirname)
          if [ -z "$PROJECT_DIR" ]; then
            echo "Could not find settings.gradle inside zip."
            exit 1
          fi
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Project dir: $PROJECT_DIR"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-oshi-debug-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/debug/*.apk
