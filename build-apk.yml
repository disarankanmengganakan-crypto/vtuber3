name: Build Android APK from uploaded zip

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find project zip
        id: find_zip
        shell: bash
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | sort | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found in repository root. Upload the project zip first."
            exit 1
          fi
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "Using $ZIP_FILE"

      - name: Unzip project
        run: |
          rm -rf extracted
          unzip -q "${{ steps.find_zip.outputs.zip_file }}" -d extracted
          find extracted -maxdepth 4 -type f | head -80

      - name: Locate and repair Gradle project
        id: project
        shell: bash
        run: |
          APP_GRADLE=$(find extracted -path "*/app/build.gradle" | head -n 1)
          if [ -z "$APP_GRADLE" ]; then
            echo "Could not find app/build.gradle inside zip."
            exit 1
          fi
          APP_DIR=$(dirname "$APP_GRADLE")
          PROJECT_DIR=$(dirname "$APP_DIR")
          echo "Project dir: $PROJECT_DIR"

          if [ ! -f "$PROJECT_DIR/settings.gradle" ] && [ ! -f "$PROJECT_DIR/settings.gradle.kts" ]; then
            cat > "$PROJECT_DIR/settings.gradle" <<'SETTINGS'
pluginManagement {
    repositories {
        google(); mavenCentral(); gradlePluginPortal()
    }
}
dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories{ google(); mavenCentral() } }
rootProject.name='VtuberOshiAutoFixed'
include ':app'
SETTINGS
          fi

          if [ ! -f "$PROJECT_DIR/build.gradle" ]; then
            cat > "$PROJECT_DIR/build.gradle" <<'ROOTGRADLE'
plugins {
    id 'com.android.application' version '8.7.3' apply false
}
ROOTGRADLE
          fi

          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vtuber-oshi-debug-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/debug/*.apk
