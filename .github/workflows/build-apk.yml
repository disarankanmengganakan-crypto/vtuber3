name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find zip
        id: find_zip
        run: |
          FILE=$(ls *.zip | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Unzip project
        run: unzip ${{ steps.find_zip.outputs.file }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: ./

      - name: Build (if exists)
        run: npm run build || echo "skip"
        working-directory: ./

      - name: Zip output
        run: zip -r output.zip ./

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: output.zip
